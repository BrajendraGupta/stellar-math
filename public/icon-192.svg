<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <circle cx="96" cy="96" r="96" fill="#0a0e27"/>
  <circle cx="96" cy="96" r="90" fill="none" stroke="#00e5ff" stroke-width="4" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="30" cy="40" r="2" fill="white" opacity="0.6"/>
  <circle cx="160" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="50" cy="150" r="2" fill="white" opacity="0.5"/>
  <circle cx="155" cy="140" r="1.5" fill="#ffd700" opacity="0.8"/>
  <circle cx="20" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="170" cy="110" r="2" fill="white" opacity="0.5"/>
  <!-- Rocket body -->
  <path d="M96 40 C82 58 76 80 76 105 L116 105 C116 80 110 58 96 40Z" fill="url(#rb)" stroke="#00e5ff" stroke-width="2"/>
  <!-- Window -->
  <circle cx="96" cy="72" r="12" fill="url(#rw)" stroke="#00e5ff" stroke-width="2"/>
  <circle cx="96" cy="72" r="7" fill="rgba(255,255,255,0.85)" opacity="0.7"/>
  <!-- Fins -->
  <path d="M76 105 L58 128 L76 120Z" fill="url(#rf)" stroke="#00e5ff" stroke-width="1.5"/>
  <path d="M116 105 L134 128 L116 120Z" fill="url(#rf)" stroke="#00e5ff" stroke-width="1.5"/>
  <!-- Flame -->
  <ellipse cx="96" cy="120" rx="12" ry="22" fill="url(#fl1)" opacity="0.9"/>
  <ellipse cx="96" cy="118" rx="7" ry="14" fill="url(#fl2)"/>
  <!-- Star on rocket -->
  <polygon points="96,55 99,64 108,64 101,70 104,79 96,73 88,79 91,70 84,64 93,64" fill="rgba(255,215,0,0.9)"/>
  <defs>
    <linearGradient id="rb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a6c"/>
      <stop offset="100%" stop-color="#0d1545"/>
    </linearGradient>
    <radialGradient id="rw" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#006064"/>
    </radialGradient>
    <linearGradient id="rf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#1a2a6c"/>
    </linearGradient>
    <radialGradient id="fl1" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="fl2" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
